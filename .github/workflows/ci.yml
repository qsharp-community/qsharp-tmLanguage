name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build grammar
        run: npm run build

      - name: Verify committed grammars are in sync with the source
        run: |
          if ! git diff --exit-code -- grammars/; then
            echo "::error::grammars/ is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Run tests
        run: npm test

  # Tokenizes the official Q# samples from a pinned QDK release and fails if
  # any of them produce `invalid` / `illegal` scopes. Bump QDK_REF to test
  # against a newer language surface.
  corpus:
    runs-on: ubuntu-latest
    env:
      QDK_REF: v1.29.0
    steps:
      - uses: actions/checkout@v4

      - name: Check out the QDK samples (pinned)
        uses: actions/checkout@v4
        with:
          repository: microsoft/qdk
          ref: ${{ env.QDK_REF }}
          path: qdk
          sparse-checkout: samples

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests against the QDK ${{ env.QDK_REF }} samples
        env:
          QDK_SAMPLES: ${{ github.workspace }}/qdk/samples
        run: npm test

  # Verifies the grammar compiles with GitHub Linguist's grammar compiler, so
  # regressions (e.g. variable-length lookbehinds) are caught before they'd
  # break syntax highlighting on GitHub.com.
  # See https://github.com/github-linguist/linguist/issues/3924#issuecomment-2960632465
  linguist:
    runs-on: ubuntu-latest
    env:
      REPO_PATH: qsharp-tmLanguage
    steps:
      - name: Checkout linguist
        uses: actions/checkout@v4
        with:
          repository: github-linguist/linguist

      - name: Checkout current repo/PR as submodule
        uses: actions/checkout@v4
        with:
          path: vendor/grammars/${{ env.REPO_PATH }}
          clean: false

      - name: Compile linguist grammar
        run: script/grammar-compiler add vendor/grammars/${{ env.REPO_PATH }}
